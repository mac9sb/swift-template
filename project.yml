name: MyApp

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  FoundationKit:
    url: https://github.com/mac9sb/swift-foundation
    from: 0.1.0

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MyApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
    resources:
      - path: Sources/App/Assets.xcassets
    dependencies:
      - package: FoundationKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.myapp
        INFOPLIST_FILE: Sources/App/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"
